services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_OWNER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD}
      POSTGRES_OWNER_USER: ${POSTGRES_OWNER_USER}
      POSTGRES_OWNER_PASSWORD: ${POSTGRES_OWNER_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER}
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD}
      POSTGRES_AUDIT_USER: ${POSTGRES_AUDIT_USER:-agent_auditor}
      POSTGRES_AUDIT_PASSWORD: ${POSTGRES_AUDIT_PASSWORD:-local-agent-password}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_OWNER_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://127.0.0.1:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "18081:8080"
    depends_on:
      - redpanda

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-agent-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    env_file: .env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-agentminio} $${MINIO_ROOT_PASSWORD:-local-agent-minio-password}; do sleep 2; done;
      mc mb --ignore-existing local/$${MINIO_BUCKET:-kyc-documents};
      mc anonymous set none local/$${MINIO_BUCKET:-kyc-documents};
      "

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      KYC_STORAGE_BACKEND: ${KYC_STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-agentminio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-local-agent-minio-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-kyc-documents}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./contracts:/app/contracts
      - ./storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: python -m backend.app.worker
    depends_on:
      - api
      - redpanda
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./contracts:/app/contracts

  analytics-monitor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: python -m backend.app.scripts.monitor_consumer --group-id analytics-worker --topics transaction-events,commission-events,float-events
    depends_on:
      - redpanda
    volumes:
      - ./backend:/app/backend

  fraud-monitor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: python -m backend.app.scripts.monitor_consumer --group-id fraud-monitor --topics transaction-events,kyc-events
    depends_on:
      - redpanda
    volumes:
      - ./backend:/app/backend

  liquidity-monitor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: python -m backend.app.scripts.monitor_consumer --group-id liquidity-monitor --topics float-events,transaction-events
    depends_on:
      - redpanda
    volumes:
      - ./backend:/app/backend

  reconciliation-monitor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: python -m backend.app.scripts.monitor_consumer --group-id reconciliation-monitor --topics transaction-events,commission-events
    depends_on:
      - redpanda
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - api

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    profiles: ["analytics"]
    working_dir: /usr/app
    env_file: .env
    environment:
      DBT_PROFILES_DIR: /usr/app/profiles
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./dbt:/usr/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["run"]

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow-metadata/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: local-airflow-secret-change-me
      AIRFLOW_CONN_AGENT_NETWORK_API: http://api:8000
      DBT_PROFILES_DIR: /opt/airflow/dbt/profiles
    ports:
      - "18080:8080"
    volumes:
      - airflow-metadata:/opt/airflow-metadata
      - airflow-logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
    depends_on:
      api:
        condition: service_started
    command: standalone

  superset:
    image: apache/superset:4.0.2
    restart: unless-stopped
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: local-superset-secret-change-me
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "18088:8088"
    volumes:
      - ./superset:/app/pythonpath
      - superset-home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redpanda-data:
  minio-data:
  airflow-metadata:
  airflow-logs:
  superset-home:
