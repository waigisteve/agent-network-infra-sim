# Local Docker PostgreSQL client authentication.
#
# Production firewalls should restrict ingress before traffic reaches Postgres.
# Local socket access is used by the official container entrypoint during first
# boot. Network clients still require SCRAM below.
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256
host    all             all             10.0.0.0/8              scram-sha-256
